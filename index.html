<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor PCB 3D Interactivo</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; background: #0f0f13; }
    #info-panel {
      position: absolute; top: 20px; left: 20px;
      background: rgba(10,15,20,0.85); color: #e0e0e0;
      padding: 12px 16px; border-radius: 8px; border: 1px solid #333;
      max-width: 300px; pointer-events: none;
      font-size: 14px; line-height: 1.5; backdrop-filter: blur(4px);
    }
    #info-panel h3 { margin: 0 0 6px; color: #4ade80; }
    #controls {
      position: absolute; bottom: 20px; left: 20px;
      background: rgba(10,15,20,0.8); color: #fff;
      padding: 10px; border-radius: 8px; border: 1px solid #444;
      display: flex; gap: 8px;
    }
    button {
      background: #2563eb; color: white; border: none; padding: 8px 12px;
      border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #1d4ed8; }
    .tag { display: inline-block; background: #374151; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="info-panel">
    <h3>🔍 Visor PCB 3D</h3>
    <p>🖱️ Arrastra para rotar • 🔽 Rueda para zoom • 👆 Clic en componentes</p>
    <div id="hover-info"></div>
  </div>

  <div id="controls">
    <button id="toggle-traces">⚡ Trazas</button>
    <button id="toggle-protections">🛡️ Protecciones</button>
    <button id="reset-view">🔄 Vista inicial</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1️⃣ ESCENA, CÁMARA Y RENDERER
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f0f13);
    scene.fog = new THREE.Fog(0x0f0f13, 40, 150);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(25, 35, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);
    controls.minDistance = 10;
    controls.maxDistance = 100;

    // 2️⃣ ILUMINACIÓN
    const ambient = new THREE.AmbientLight(0x404040, 1.2);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 2);
    dirLight.position.set(15, 25, 15);
    dirLight.castShadow = true;
    scene.add(dirLight);
    const fillLight = new THREE.DirectionalLight(0x8899ff, 0.8);
    fillLight.position.set(-15, 10, -10);
    scene.add(fillLight);

    // 3️⃣ PCB Y COMPONENTES
    const pcbGroup = new THREE.Group();
    scene.add(pcbGroup);

    // Placa FR4
    const board = new THREE.Mesh(
      new THREE.BoxGeometry(36, 1.6, 22),
      new THREE.MeshStandardMaterial({ color: 0x0b6e4f, roughness: 0.6 })
    );
    board.position.y = 0.8;
    board.receiveShadow = true;
    pcbGroup.add(board);

    // Capa de cobre
    const copper = new THREE.Mesh(
      new THREE.BoxGeometry(35, 0.15, 21),
      new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.7, roughness: 0.25 })
    );
    copper.position.y = 1.65;
    pcbGroup.add(copper);

    // Trazas (simplificadas)
    const tracesGroup = new THREE.Group();
    const traceMat = new THREE.LineBasicMaterial({ color: 0xffc107, linewidth: 1.5 });
    const tracePaths = [
      [[-14, 1.75, -7], [0, 1.75, -4], [12, 1.75, 2], [16, 1.75, 6]],
      [[-14, 1.75, -2], [6, 1.75, -1], [9, 1.75, 3], [18, 1.75, 7]],
      [[-10, 1.75, 5], [-4, 1.75, 4], [3, 1.75, 2], [13, 1.75, -1]]
    ];
    tracePaths.forEach(path => {
      const geo = new THREE.BufferGeometry().setFromPoints(path.map(p => new THREE.Vector3(...p)));
      tracesGroup.add(new THREE.Line(geo, traceMat));
    });
    pcbGroup.add(tracesGroup);

    // Componentes con datos interactivos
    const componentsGroup = new THREE.Group();
    const compData = [
      { pos: [-9, 1.65, -5], size: [2.8, 1.8, 3.5], color: 0x1a1a1a, name: 'U1: Microcontrolador', desc: 'STM32F407VGT6', tag: 'Procesador' },
      { pos: [11, 1.65, -3], size: [3.5, 1.2, 1.8], color: 0x3b82f6, name: 'J1: Conector USB-C', desc: 'Entrada 5V/3A + Datos', tag: 'Conector' },
      { pos: [4, 1.65, 9], size: [1.2, 1.2, 0.8], color: 0x10b981, name: 'F1: Fusible PTC', desc: 'Resettable 1A, protección sobrecorriente', tag: 'Protección' },
      { pos: [-7, 1.65, 7], size: [0.9, 1.1, 1.3], color: 0xef4444, name: 'D1: Diodo TVS', desc: 'SMBJ5.0A, protección ESD/transitorios', tag: 'Protección' },
      { pos: [15, 1.65, -9], size: [1.8, 1.5, 1.2], color: 0xf59e0b, name: 'RV1: Varistor MOV', desc: '14D471K, protección sobretensión AC/DC', tag: 'Protección' }
    ];

    compData.forEach(c => {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(...c.size),
        new THREE.MeshStandardMaterial({ color: c.color, roughness: 0.4 })
      );
      mesh.position.set(...c.pos);
      mesh.castShadow = true;
      mesh.userData = { type: 'component', name: c.name, desc: c.desc, tag: c.tag };
      componentsGroup.add(mesh);
    });
    pcbGroup.add(componentsGroup);

    // 4️⃣ INTERACCIÓN (Raycasting)
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredObj = null;
    const allMeshes = [];
    pcbGroup.traverse(child => { if (child.isMesh) allMeshes.push(child); });

    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    window.addEventListener('click', () => {
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(allMeshes, true);
      if (hits.length && hits[0].object.userData.name) {
        const u = hits[0].object.userData;
        alert(`📦 ${u.name}\n${u.desc}`);
      }
    });

    // 5️️ CONTROLES UI
    document.getElementById('toggle-traces').addEventListener('click', () => {
      tracesGroup.visible = !tracesGroup.visible;
    });

    document.getElementById('toggle-protections').addEventListener('click', () => {
      let active = false;
      componentsGroup.children.forEach(mesh => {
        if (mesh.userData.tag === 'Protección') {
          active = mesh.material.emissiveIntensity > 0;
          mesh.material.emissive = active ? new THREE.Color(0x000000) : new THREE.Color(0xffaa00);
          mesh.material.emissiveIntensity = active ? 0 : 0.6;
        }
      });
    });

    document.getElementById('reset-view').addEventListener('click', () => {
      camera.position.set(25, 35, 40);
      controls.target.set(0, 0, 0);
      controls.update();
    });

    // 6️⃣ LOOP DE RENDER
    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(allMeshes, true);
      const panel = document.getElementById('hover-info');

      if (hits.length && hits[0].object.userData.name) {
        const u = hits[0].object.userData;
        panel.innerHTML = `<strong>${u.name}</strong><br>${u.desc}<br><span class="tag">${u.tag}</span>`;
      } else {
        panel.innerHTML = '';
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
